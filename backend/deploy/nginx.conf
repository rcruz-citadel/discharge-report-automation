server {
    listen 443 ssl;
    server_name citadelbmi001.citadelhealth.local;

    # TLS (existing self-signed or internal CA cert)
    # ssl_certificate     /etc/ssl/certs/citadelbmi001.crt;
    # ssl_certificate_key /etc/ssl/private/citadelbmi001.key;

    root /opt/discharge_report_automation/frontend/dist;
    index index.html;

    # Enable gzip for JSON payloads (~1.5MB compressed for 17k rows)
    gzip on;
    gzip_types application/json text/css application/javascript text/javascript;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increase timeout for the /api/discharges endpoint (large payload)
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback for React Router
    }
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name citadelbmi001.citadelhealth.local;
    return 301 https://$server_name$request_uri;
}
